services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tiaras
    ports:
      - "5432:5432"
    volumes:
      - tiaras_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tiaras"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - tiaras_redis:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  tiaras_pg:
  tiaras_redis:
