name: Sovereignty control-plane CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sovereignty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm sovereignty:typecheck
      - run: pnpm sovereignty:test
      - run: pnpm sovereignty:validate-registries
      - run: pnpm turbo run build
      - run: pnpm turbo run test
      - run: pnpm dlx gitleaks detect --no-git --redact --source .
