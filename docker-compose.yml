services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kdao
      POSTGRES_PASSWORD: kdao
      POSTGRES_DB: kdaocore
    ports: ["5432:5432"]
    volumes: ["kdaocore-postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kdao -d kdaocore"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  kdaocore-postgres:
